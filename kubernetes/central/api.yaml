apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ namespace }}
  labels:
    app: api
    role: main
    environment: "{{ env_name }}"
spec:
  replicas: {{ replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api
      role: main
      environment: "{{ env_name }}"
  template:
    metadata:
      annotations:
        ansible_restarted_at: "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"
      labels:
        app: api
        role: main
        environment: "{{ env_name }}"
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: api
          image: "{{ image }}"
          ports:
            - containerPort: {{ port }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/futurekawa_core"
            - name: DB_TYPE
              value: "postgres"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "secret"
            - name: DB_DATABASE
              value: "futurekawa_core"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ port }}
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ namespace }}
spec:
  type: NodePort
  selector:
    app: api
    role: main
    environment: "{{ env_name }}"
  ports:
    - port: 80
      targetPort: {{ port }}
      nodePort: 31081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: {{ namespace }}
spec:
  rules:
  - host: "api.karim-portfolio.xyz"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 80
