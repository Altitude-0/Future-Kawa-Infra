apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ namespace }}
  labels:
    app: postgres
    role: main
    environment: "{{ env_name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: main
      environment: "{{ env_name }}"
  template:
    metadata:
      labels:
        app: postgres
        role: main
        environment: "{{ env_name }}"
    spec:
      containers:
        - name: postgres
          image: "{{ image }}"
          env:
            - name: POSTGRES_DB
              value: "futurekawa_core"
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: "secret"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ namespace }}
spec:
  type: NodePort
  selector:
    app: postgres
    role: main
    environment: "{{ env_name }}"
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 31432
