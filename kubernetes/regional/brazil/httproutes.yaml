apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-brazil-route
  namespace: staging-brazil
spec:
  parentRefs:
    - name: main-gateway
      namespace: apisix
      sectionName: http
  hostnames:
    - api-brazil.karim-portfolio.xyz
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: api
          port: 80
---
