# --- Regional MQTT Service Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-service
  namespace: {{ namespace }}
  labels:
    app: mqtt-service
    country: "{{ country }}"
    environment: "{{ env_name }}"
spec:
  replicas: {{ replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: mqtt-service
      country: "{{ country }}"
      environment: "{{ env_name }}"
  template:
    metadata:
      annotations:
        ansible_restarted_at: "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"
      labels:
        app: mqtt-service
        country: "{{ country }}"
        environment: "{{ env_name }}"
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: mqtt-service
          image: "{{ image }}"
          ports:
            - containerPort: {{ app_port }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://db-brazil:5432/futurekawa-postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: brazil-staging-app-secrets
                  key: mqtt_db_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: brazil-staging-app-secrets
                  key: mqtt_db_password
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: brazil-staging-app-secrets
                  key: mqtt_rabbitmq_user
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: brazil-staging-app-secrets
                  key: mqtt_rabbitmq_password
            - name: MQTT_BROKER_URL
              value: "tcp://mosquitto:1883"
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-service
  namespace: {{ namespace }}
spec:
  type: NodePort
  selector:
    app: mqtt-service
    country: "{{ country }}"
    environment: "{{ env_name }}"
  ports:
    - port: 80
      targetPort: {{ app_port }}
      nodePort: {{ mqtt_service_port | int }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mqtt-service
  namespace: {{ namespace }}
  annotations:                                                                                                                         
    traefik.ingress.kubernetes.io/router.middlewares: common-waf@kubernetescrd 
  labels:
    app: mqtt-service
    country: "{{ country }}"
    environment: "{{ env_name }}"
spec:
  rules:
  - host: "{{ mqtt_service_host }}"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mqtt-service
            port:
              number: 80