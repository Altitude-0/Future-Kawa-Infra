apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: {{ namespace }}
  labels:
    app: mailhog
    country: "{{ country }}"
    environment: "{{ env_name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
      country: "{{ country }}"
      environment: "{{ env_name }}"
  template:
    metadata:
      labels:
        app: mailhog
        country: "{{ country }}"
        environment: "{{ env_name }}"
    spec:
      containers:
        - name: mailhog
          image: "{{ image }}"
          ports:
            - name: smtp
              containerPort: 1025
            - name: ui
              containerPort: 8025
          readinessProbe:
            httpGet:
              path: /
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8025
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: {{ namespace }}
spec:
  type: ClusterIP
  selector:
    app: mailhog
    country: "{{ country }}"
    environment: "{{ env_name }}"
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: ui
      port: 8025
      targetPort: 8025   