# --- Regional Postgres Database ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ namespace }}
  labels:
    app: postgres
    country: "{{ country }}"
    environment: "{{ environment }}"
spec:
  replicas: {{ replicas }}
  selector:
    matchLabels:
      app: postgres
      country: "{{ country }}"
      environment: "{{ environment }}"
  template:
    metadata:
      labels:
        app: postgres
        country: "{{ country }}"
        environment: "{{ environment }}"
    spec:
      containers:
        - name: postgres
          image: "{{ image }}"
          env:
            - name: POSTGRES_DB
              value: "futurekawa-postgres"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "secret"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ namespace }}
spec:
  type: NodePort
  selector:
    app: postgres
    country: "{{ country }}"
    environment: "{{ environment }}"
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: {{ db_port }}
