# --- Jaeger All-in-One for staging-brazil ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: {{ namespace }}
  labels:
    app: jaeger
    country: "{{ country }}"
    environment: "{{ env_name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
        country: "{{ country }}"
        environment: "{{ env_name }}"
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.57
          ports:
            - name: ui
              containerPort: 16686   # Query UI
            - name: collector-http
              containerPort: 14268   # HTTP ingest (Jaeger native)
            - name: collector-grpc
              containerPort: 14250   # gRPC ingest (Jaeger native)
            - name: zipkin
              containerPort: 9411    # Zipkin-compatible endpoint
            - name: otlp-grpc
              containerPort: 4317    # OTLP gRPC (OpenTelemetry)
            - name: otlp-http
              containerPort: 4318    # OTLP HTTP (OpenTelemetry)
            - name: admin
              containerPort: 14269   # Admin / health check
          env:
            - name: COLLECTOR_ZIPKIN_HOST_PORT
              value: ":9411"
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: "memory"
            - name: MEMORY_MAX_TRACES
              value: "50000"
          readinessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: {{ namespace }}
  labels:
    app: jaeger
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: collector-http
      port: 14268
      targetPort: 14268
    - name: collector-grpc
      port: 14250
      targetPort: 14250
    - name: zipkin
      port: 9411
      targetPort: 9411
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318