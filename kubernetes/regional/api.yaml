# --- Regional API Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ namespace }}
  labels:
    app: api
    country: "{{ country }}"
    environment: "{{ environment }}"
spec:
  replicas: {{ replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api
      country: "{{ country }}"
      environment: "{{ environment }}"
  template:
    metadata:
      annotations:
        ansible_restarted_at: "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"
      labels:
        app: api
        country: "{{ country }}"
        environment: "{{ environment }}"
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: api
          image: "{{ image }}"
          ports:
            - containerPort: {{ port }}
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: {{ port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: {{ port }}
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ namespace }}
spec:
  type: NodePort
  selector:
    app: api
    country: "{{ country }}"
    environment: "{{ environment }}"
  ports:
    - port: 80
      targetPort: {{ port }}
      nodePort: {{ api_port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: {{ namespace }}
  labels:
    app: api
    country: "{{ country }}"
    environment: "{{ environment }}"
spec:
  rules:
  - host: "{{ api_host }}"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 80
