# --- Regional RabbitMQ Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: {{ namespace }}
  labels:
    app: rabbitmq
    country: "{{ country }}"
    environment: "{{ env_name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
      country: "{{ country }}"
      environment: "{{ env_name }}"
  template:
    metadata:
      labels:
        app: rabbitmq
        country: "{{ country }}"
        environment: "{{ env_name }}"
    spec:
      containers:
        - name: rabbitmq
          image: "{{ image }}"
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: "{{ country }}-staging-app-secrets"
                  key: rabbitmq_user
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: "{{ country }}-staging-app-secrets"
                  key: rabbitmq_password
          readinessProbe:                                                                                                                      
                exec:                                                                                                                              
                  command: ["rabbitmq-diagnostics", "ping"]                                                                                        
                initialDelaySeconds: 40                                                                                                            
                periodSeconds: 10                                                                                                                  
                timeoutSeconds: 10        # ← add this                                                                                             
                failureThreshold: 5       # ← add this                                                                                             
          livenessProbe:                                                                                                                       
                exec:                                                                                                                              
                  command: ["rabbitmq-diagnostics", "ping"]                                                                                        
                initialDelaySeconds: 60                                                                                                            
                periodSeconds: 20                                                                                                                  
                timeoutSeconds: 10        # ← add this                                                                                             
                failureThreshold: 3       # ← add this
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: {{ namespace }}
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
    country: "{{ country }}"
    environment: "{{ env_name }}"
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672